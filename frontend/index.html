<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rossmann Demand Forecasting</title>
    <meta name="description" content="AI powered Demand Dashboard for Rossmann">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2>Rossmann AI</h2>
                <p>Demand Simulation</p>
            </div>

            <form id="simulation-form">
                <div class="form-group">
                    <label for="log_price">Log Price</label>
                    <input type="number" id="log_price" step="0.01" value="2.5" required>
                </div>
                
                <div class="form-group">
                    <label for="lag_1">Lag 1 (Demand)</label>
                    <input type="number" id="lag_1" step="0.1" value="10.0" required>
                </div>

                <div class="form-group">
                    <label for="lag_7">Lag 7 (Demand)</label>
                    <input type="number" id="lag_7" step="0.1" value="9.5" required>
                </div>

                <div class="form-group">
                    <label for="Promo">Promo Status</label>
                    <select id="Promo">
                        <option value="1">Active (1)</option>
                        <option value="0">Inactive (0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="volatility_7">7-Day Volatility</label>
                    <input type="number" id="volatility_7" step="0.01" value="0.5" required>
                </div>

                <div class="form-group">
                    <label for="trend_7">7-Day Trend</label>
                    <input type="number" id="trend_7" step="0.01" value="0.1" required>
                </div>

                <div class="form-group">
                    <label for="regime">Regime Profile</label>
                    <select id="regime">
                        <option value="stable">Stable</option>
                        <option value="growth">Growth</option>
                        <option value="decline">Decline</option>
                        <option value="volatile">Volatile</option>
                    </select>
                </div>

                <div class="form-group simulation-range">
                    <label>Simulate Log Price Range</label>
                    <div class="input-row">
                        <input type="number" id="log_price_min" step="0.1" value="1.5" title="Min Log Price" placeholder="Min">
                        <span>-</span>
                        <input type="number" id="log_price_max" step="0.1" value="3.5" title="Max Log Price" placeholder="Max">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Run Simulation</span>
                    <div class="spinner" style="display: none;"></div>
                </button>
            </form>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Demand & Elasticity Analytics</h1>
            </header>

            <div class="metrics-grid">
                <div class="metric-card glass-panel" id="card-elasticity">
                    <h3>Price Elasticity</h3>
                    <div class="metric-value">-</div>
                    <p class="metric-desc">Expected drop in demand per 1% price increase.</p>
                </div>
                <div class="metric-card glass-panel" id="card-forecast">
                    <h3>Base Forecast</h3>
                    <div class="metric-value">-</div>
                    <p class="metric-desc">Predicted demand for the given log price.</p>
                </div>
                <div class="metric-card glass-panel" id="card-status">
                    <h3>Status</h3>
                    <div class="metric-value status-indicator">Pending Run</div>
                </div>
            </div>

            <div class="chart-container glass-panel">
                <div class="chart-header">
                    <h2>Demand Curve Simulation</h2>
                    <p>Visualizing demand across the specified price range.</p>
                </div>
                <canvas id="demandChart"></canvas>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
